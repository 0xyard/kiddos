<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dancing Apples and Bananas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Soft overlay gradient + illustrated farm background image */
      background:
        radial-gradient(circle at top, rgba(255, 230, 242, 0.85) 0, rgba(255, 247, 230, 0.85) 40%, rgba(243, 248, 255, 0.85) 100%),
        url("https://pixabay.com/get/g2c62412d333e046185335b746959760959afa0e2f3b73ad13f9f927508827b4aa2398d99c8ec5bca82b00fb414ecb03d_1920.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #333;
      user-select: none;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 2.2rem;
      letter-spacing: 0.04em;
    }

    .stage {
      position: relative;
      width: min(420px, 90vw);
      height: 260px;
      border-radius: 24px;
      background: linear-gradient(to top, #f0f0f0 0, #ffffff 45%, #fdf2ff 100%);
      box-shadow:
        0 14px 35px rgba(0, 0, 0, 0.12),
        0 0 0 3px rgba(255, 255, 255, 0.9),
        0 0 40px rgba(255, 204, 0, 0.35);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 36px;
    }

    .floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: radial-gradient(circle at top, #ffffff 0, #f4f4f4 45%, #e4e4e4 100%);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .spotlight {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 25% 0%, rgba(255, 255, 255, 0.7), transparent 55%),
        radial-gradient(circle at 75% 0%, rgba(255, 255, 255, 0.7), transparent 55%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .fruit-group {
      position: relative;
      display: flex;
      gap: 40px;
      align-items: flex-end;
      z-index: 1;
    }

    .fruit-group.extras {
      position: fixed;
      inset: 0;
      display: block;
      pointer-events: none;
      z-index: 0;
    }

    .fruit {
      font-size: 64px;
      filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.3));
      transform-origin: center bottom;
      animation: dance 1.4s ease-in-out infinite;
      cursor: grab;
    }

    .fruit.extra {
      position: absolute;
      font-size: 52px;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: auto;
    }

    .fruit.extra.visible {
      opacity: 1;
    }

    .fruit.dragging {
      animation: none !important;
      cursor: grabbing;
    }

    .fruit.apple {
      animation-delay: 0s;
    }

    .fruit.banana {
      animation-delay: 0.3s;
    }

    .fruit::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 56px;
      height: 14px;
      background: radial-gradient(circle, rgba(0, 0, 0, 0.4), transparent 70%);
      transform: translateX(-50%);
      filter: blur(2px);
      opacity: 0.9;
    }

    .note {
      position: absolute;
      font-size: 20px;
      color: #ff66b2;
      opacity: 0;
      animation: floatNote 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    .note:nth-child(1) {
      left: 18%;
      bottom: 55%;
      animation-delay: 0.1s;
    }

    .note:nth-child(2) {
      left: 55%;
      bottom: 70%;
      animation-delay: 0.5s;
    }

    .note:nth-child(3) {
      right: 12%;
      bottom: 50%;
      animation-delay: 0.9s;
    }

    .vowel-display {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 96px;
      font-weight: 800;
      color: #ff4081;
      text-shadow:
        0 0 18px rgba(255, 64, 129, 0.7),
        0 0 32px rgba(255, 255, 255, 0.9);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 10;
    }

    .vowel-display.visible {
      opacity: 1;
    }

    @keyframes dance {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      20% {
        transform: translateY(-14px) rotate(-6deg);
      }
      40% {
        transform: translateY(0) rotate(4deg);
      }
      60% {
        transform: translateY(-10px) rotate(8deg);
      }
      80% {
        transform: translateY(1px) rotate(-4deg);
      }
    }

    @keyframes floatNote {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.9);
      }
      30% {
        opacity: 1;
      }
      70% {
        opacity: 1;
        transform: translateY(-14px) scale(1.05);
      }
      100% {
        opacity: 0;
        transform: translateY(-26px) scale(1.1);
      }
    }

    .caption {
      margin-top: 18px;
      font-size: 1rem;
      color: #555;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      z-index: 30;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .count-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: text;
    }

    .count-controls label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
    }

    .count-controls input {
      width: 44px;
      padding: 4px 6px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .count-controls button {
      padding: 6px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: #e91e63;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .count-controls button:hover {
      background: #c2185b;
    }

    .song-player {
      margin-left: auto;
      user-select: auto;
    }

    .basket-row {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      z-index: 5;
    }

    .basket {
      min-width: 120px;
      padding: 4px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #3b2210;
      font-weight: 700;
      font-size: 0.95rem;
      pointer-events: auto;
      position: relative;
    }

    .basket-emoji {
      font-size: 3rem;
      line-height: 1;
      display: block;
    }

    .basket-label {
      margin-top: 4px;
    }

    .basket-feedback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #ff1744;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .basket-feedback.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>Apple &amp; Banana Dance Party</h1>

  <div id="top-bar" class="top-bar">
    <div class="count-controls">
      <label>Apples <input id="input-apples" type="number" min="1" max="50" value="5"></label>
      <label>Bananas <input id="input-bananas" type="number" min="1" max="50" value="5"></label>
      <button type="button" id="apply-counts">Apply</button>
    </div>
    <audio
      id="song"
      class="song-player"
      src="https://www.songsforteaching.com/freedownloads/12/SongsForTeaching-com-ApplesAndBananas.mp3"
      controls
      loop
      autoplay
    ></audio>
  </div>

  <div class="stage">
    <div class="spotlight"></div>
    <div class="fruit-group">
      <div class="fruit apple" aria-label="Dancing apple" role="img">🍎</div>
      <div class="fruit banana" aria-label="Dancing banana" role="img">🍌</div>
    </div>
    <div class="fruit-group extras">
      <!-- Extra apples and bananas are generated via JavaScript -->
    </div>
    <div id="vowel" class="vowel-display" aria-hidden="true"></div>
    <div class="floor"></div>

    <!-- Musical notes floating around -->
    <div class="note">♪</div>
    <div class="note">♫</div>
    <div class="note">🎵</div>
  </div>

  <div class="basket-row">
    <div id="apple-basket" class="basket" aria-label="Apple basket">
      <span class="basket-emoji" aria-hidden="true">🧺</span>
      <div class="basket-label">Apple Basket <span aria-hidden="true">🍎</span></div>
      <div class="basket-feedback" aria-hidden="true">✖</div>
    </div>
    <div id="banana-basket" class="basket" aria-label="Banana basket">
      <span class="basket-emoji" aria-hidden="true">🧺</span>
      <div class="basket-label">Banana Basket <span aria-hidden="true">🍌</span></div>
      <div class="basket-feedback" aria-hidden="true">✖</div>
    </div>
  </div>

  <p class="caption">Two fruity friends, dancing all day long.</p>

  <script>
    (function () {
      const audio = document.getElementById("song");
      const vowelEl = document.getElementById("vowel");
      const stage = document.querySelector(".stage");
      const extrasContainer = document.querySelector(".fruit-group.extras");
      const appleBasket = document.getElementById("apple-basket");
      const bananaBasket = document.getElementById("banana-basket");
      const inputApples = document.getElementById("input-apples");
      const inputBananas = document.getElementById("input-bananas");
      const applyCountsBtn = document.getElementById("apply-counts");
      const topBar = document.getElementById("top-bar");

      if (!audio || !vowelEl || !stage || !extrasContainer || !appleBasket || !bananaBasket) return;
      if (!inputApples || !inputBananas || !applyCountsBtn || !topBar) return;

      let countApples = 5;
      let countBananas = 5;
      const extraFruits = [];

      function getPointerPosition(evt) {
        if (evt.touches && evt.touches[0]) {
          return { x: evt.touches[0].clientX, y: evt.touches[0].clientY };
        }
        return { x: evt.clientX, y: evt.clientY };
      }

      function isInBasket(centerX, centerY, basketEl) {
        const rect = basketEl.getBoundingClientRect();
        return centerX >= rect.left && centerX <= rect.right && centerY >= rect.top && centerY <= rect.bottom;
      }

      function playErrorSound() {
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          const ctx = new AudioCtx();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "square";
          osc.frequency.value = 220;
          osc.connect(gain);
          gain.connect(ctx.destination);
          gain.gain.setValueAtTime(0.4, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } catch (e) {
          // ignore audio errors
        }
      }

      function playSuccessSound() {
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          const ctx = new AudioCtx();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(660, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          gain.gain.setValueAtTime(0.35, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } catch (e) {
          // ignore audio errors
        }
      }

      function showBasketError(basketEl) {
        const fb = basketEl.querySelector(".basket-feedback");
        if (!fb) return;
        fb.classList.add("visible");
        setTimeout(() => {
          fb.classList.remove("visible");
        }, 350);
      }

      function makeDraggable(el, type) {
        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        function onPointerDown(e) {
          const pos = getPointerPosition(e);
          const rect = el.getBoundingClientRect();

          isDragging = true;
          el.classList.add("dragging");

          // Switch to fixed so it stays at that screen position while dragging.
          el.style.position = "fixed";
          el.style.left = rect.left + "px";
          el.style.top = rect.top + "px";
          el.style.bottom = "auto";
          el.style.right = "auto";
          el.style.transform = "none";
          el.style.zIndex = "20";

          offsetX = pos.x - rect.left;
          offsetY = pos.y - rect.top;

          document.addEventListener("mousemove", onPointerMove);
          document.addEventListener("mouseup", onPointerUp);
          document.addEventListener("touchmove", onPointerMove, { passive: false });
          document.addEventListener("touchend", onPointerUp);

          e.preventDefault();
        }

        function onPointerMove(e) {
          if (!isDragging) return;
          const pos = getPointerPosition(e);
          const tr = topBar.getBoundingClientRect();
          let top = pos.y - offsetY;
          // Keep fruit below the header (top bar).
          if (top < tr.bottom) top = tr.bottom;
          el.style.left = pos.x - offsetX + "px";
          el.style.top = top + "px";
          if (e.cancelable) e.preventDefault();
        }

        function onPointerUp() {
          if (!isDragging) return;
          isDragging = false;
          el.classList.remove("dragging");

          const rect = el.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;

          const inApple = isInBasket(centerX, centerY, appleBasket);
          const inBanana = isInBasket(centerX, centerY, bananaBasket);

          const isApple = type === "apple";
          const isBanana = type === "banana";

          // Only allow correct fruit into its matching basket; wrong basket gives error feedback.
          if ((isApple && inApple) || (isBanana && inBanana)) {
            playSuccessSound();
            el.remove();
          } else if (inApple || inBanana) {
            const wrongBasket = inApple ? appleBasket : bananaBasket;
            playErrorSound();
            showBasketError(wrongBasket);

            // Nudge the fruit away from the basket so it doesn't get "stuck" underneath.
            const basketRect = wrongBasket.getBoundingClientRect();
            const fruitRect = rect;

            let newTop = basketRect.top - fruitRect.height - 16; // above the basket
            if (newTop < 0) {
              newTop = basketRect.bottom + 16; // if not enough space above, put it below
            }
            let newLeft = basketRect.left + (basketRect.width - fruitRect.width) / 2;
            const maxLeft = (window.innerWidth || 0) - fruitRect.width - 4;
            if (newLeft < 4) newLeft = 4;
            if (maxLeft > 0 && newLeft > maxLeft) newLeft = maxLeft;

            el.style.top = newTop + "px";
            el.style.left = newLeft + "px";
          }

          // If fruit was dropped in the header area, move it below the header.
          if (el.isConnected) {
            const r = el.getBoundingClientRect();
            const headerRect = topBar.getBoundingClientRect();
            if (r.top < headerRect.bottom) {
              el.style.top = headerRect.bottom + 10 + "px";
            }
          }

          document.removeEventListener("mousemove", onPointerMove);
          document.removeEventListener("mouseup", onPointerUp);
          document.removeEventListener("touchmove", onPointerMove);
          document.removeEventListener("touchend", onPointerUp);
        }

        el.addEventListener("mousedown", onPointerDown);
        el.addEventListener("touchstart", onPointerDown, { passive: false });
      }

      function createExtras() {
        extrasContainer.innerHTML = "";
        extraFruits.length = 0;

        const extraApples = Math.max(0, countApples - 1);
        const extraBananas = Math.max(0, countBananas - 1);

        function makeFruits(type, count) {
          for (let i = 0; i < count; i++) {
            const el = document.createElement("div");
            el.className = "fruit " + type + " extra";
            el.textContent = type === "apple" ? "🍎" : "🍌";
            el.setAttribute("aria-hidden", "true");

            const baseDuration = 1.2;
            const randomDuration = baseDuration + Math.random() * 1.2;
            const randomDelay = Math.random() * 1.5;
            el.style.animationDuration = randomDuration.toFixed(2) + "s";
            el.style.animationDelay = randomDelay.toFixed(2) + "s";

            extrasContainer.appendChild(el);
            extraFruits.push(el);
            makeDraggable(el, type);
          }
        }

        makeFruits("apple", extraApples);
        makeFruits("banana", extraBananas);
      }

      // Scatter extra fruits around the full viewport; keep a clear area around the top bar.
      function layoutExtras() {
        const paddingXPercent = 5;
        const minBottomPercent = 5;
        const maxBottomPercent = 90;

        const viewportH = window.innerHeight || 1;
        const viewportW = window.innerWidth || 1;
        const topBarRect = topBar.getBoundingClientRect();

        function overlapsTopBar(leftPercent, bottomPercent) {
          const xPx = (leftPercent / 100) * viewportW;
          const yFromBottomPx = (bottomPercent / 100) * viewportH;
          const yPx = viewportH - yFromBottomPx;
          const paddingX = 24;
          const paddingY = 40; /* keep fruit placement clearly below header */
          const inX = xPx > topBarRect.left - paddingX && xPx < topBarRect.right + paddingX;
          const inY = yPx > topBarRect.top - paddingY && yPx < topBarRect.bottom + paddingY;
          return inX && inY;
        }

        extraFruits.forEach((el, index) => {
          let left;
          let bottom;
          let attempts = 0;

          do {
            left = paddingXPercent + Math.random() * (100 - 2 * paddingXPercent);
            bottom =
              minBottomPercent +
              ((maxBottomPercent - minBottomPercent) * (index / Math.max(extraFruits.length - 1, 1)));
            attempts += 1;
          } while (overlapsTopBar(left, bottom) && attempts < 10);

          el.style.left = left + "%";
          el.style.bottom = bottom + "%";
        });
      }

      createExtras();

      document.querySelectorAll(".stage .fruit-group > .fruit").forEach((el) => {
        const type = el.classList.contains("apple") ? "apple" : "banana";
        makeDraggable(el, type);
      });
      layoutExtras();
      window.addEventListener("resize", layoutExtras);

      applyCountsBtn.addEventListener("click", function () {
        const a = parseInt(inputApples.value, 10);
        const b = parseInt(inputBananas.value, 10);
        countApples = isNaN(a) ? 5 : Math.max(1, Math.min(50, a));
        countBananas = isNaN(b) ? 5 : Math.max(1, Math.min(50, b));
        inputApples.value = countApples;
        inputBananas.value = countBananas;
        createExtras();
        layoutExtras();
      });

      function updateVowel() {
        const t = audio.currentTime || 0;
        let letter = "";

        if (t >= 13 && t < 26) {
          letter = "A";
        } else if (t >= 26 && t < 38) {
          letter = "E";
        } else if (t >= 38 && t < 49) {
          letter = "I";
        } else if (t >= 49 && t < 61) {
          letter = "O";
        } else if (t >= 61 && t < 75) {
          letter = "U";
        } else {
          letter = "";
        }

        // Handle vowel overlay visibility.

        if (letter) {
          vowelEl.textContent = letter;
          vowelEl.classList.add("visible");
        } else {
          vowelEl.textContent = "";
          vowelEl.classList.remove("visible");
        }

        // Keep all fruits visible at all times.
        extraFruits.forEach((el) => {
          el.classList.add("visible");
        });
      }

      audio.addEventListener("timeupdate", updateVowel);

      // Ensure correct state when looping or restarting.
      audio.addEventListener("play", updateVowel);
      audio.addEventListener("seeked", updateVowel);
    })();
  </script>
</body>
</html>
