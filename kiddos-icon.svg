<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#FF8E53"/>
      <stop offset="100%" style="stop-color:#FFC61A"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE08A"/>
      <stop offset="100%" style="stop-color:#FFD060"/>
    </linearGradient>
    <linearGradient id="starGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="starGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="starGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000033"/>
    </filter>
    <filter id="faceShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000022"/>
    </filter>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle dot pattern overlay -->
  <g opacity="0.12" clip-path="url(#roundedSquare)">
    <circle cx="80" cy="80" r="18" fill="white"/>
    <circle cx="160" cy="40" r="10" fill="white"/>
    <circle cx="40" cy="160" r="10" fill="white"/>
    <circle cx="432" cy="80" r="18" fill="white"/>
    <circle cx="352" cy="40" r="10" fill="white"/>
    <circle cx="472" cy="160" r="10" fill="white"/>
    <circle cx="80" cy="432" r="18" fill="white"/>
    <circle cx="160" cy="472" r="10" fill="white"/>
    <circle cx="40" cy="352" r="10" fill="white"/>
    <circle cx="432" cy="432" r="18" fill="white"/>
    <circle cx="352" cy="472" r="10" fill="white"/>
    <circle cx="472" cy="352" r="10" fill="white"/>
  </g>

  <!-- Star top-left (purple) -->
  <g transform="translate(88, 90) rotate(-15)" filter="url(#shadow)">
    <polygon points="0,-28 6.5,-9 26,-9 11,4 17,23 0,12 -17,23 -11,4 -26,-9 -6.5,-9" fill="url(#starGrad1)"/>
  </g>

  <!-- Star top-right (green) -->
  <g transform="translate(424, 100) rotate(20)" filter="url(#shadow)">
    <polygon points="0,-22 5.1,-7 20,-7 8.6,3 13.3,18 0,9 -13.3,18 -8.6,3 -20,-7 -5.1,-7" fill="url(#starGrad2)"/>
  </g>

  <!-- Star bottom-left (blue) -->
  <g transform="translate(100, 400) rotate(10)" filter="url(#shadow)">
    <polygon points="0,-20 4.6,-6.4 18,-6.4 7.8,2.8 12,17 0,8.2 -12,17 -7.8,2.8 -18,-6.4 -4.6,-6.4" fill="url(#starGrad3)"/>
  </g>

  <!-- Star bottom-right (purple small) -->
  <g transform="translate(415, 390) rotate(-25)" filter="url(#shadow)">
    <polygon points="0,-24 5.6,-7.7 22,-7.7 9.4,3.4 14.4,21 0,10 -14.4,21 -9.4,3.4 -22,-7.7 -5.6,-7.7" fill="url(#starGrad1)"/>
  </g>

  <!-- Tiny accent dots -->
  <circle cx="170" cy="115" r="8" fill="white" opacity="0.7"/>
  <circle cx="342" cy="118" r="6" fill="white" opacity="0.6"/>
  <circle cx="155" cy="390" r="7" fill="white" opacity="0.6"/>
  <circle cx="360" cy="385" r="9" fill="white" opacity="0.7"/>

  <!-- Main face circle -->
  <circle cx="256" cy="220" r="140" fill="url(#faceGrad)" filter="url(#faceShadow)"/>

  <!-- Rosy cheeks -->
  <ellipse cx="166" cy="248" rx="30" ry="20" fill="#FF9090" opacity="0.5"/>
  <ellipse cx="346" cy="248" rx="30" ry="20" fill="#FF9090" opacity="0.5"/>

  <!-- Eyes -->
  <ellipse cx="210" cy="195" rx="22" ry="26" fill="#2D1B00"/>
  <ellipse cx="302" cy="195" rx="22" ry="26" fill="#2D1B00"/>
  <!-- Eye shine -->
  <circle cx="219" cy="186" r="8" fill="white"/>
  <circle cx="311" cy="186" r="8" fill="white"/>
  <circle cx="224" cy="182" r="4" fill="white"/>
  <circle cx="316" cy="182" r="4" fill="white"/>

  <!-- Big smile -->
  <path d="M188,252 Q256,320 324,252" stroke="#2D1B00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M203,264 Q256,308 309,264" fill="white"/>
  <path d="M203,264 Q256,308 309,264 Q295,280 256,282 Q217,280 203,264Z" fill="white"/>
  <!-- Tongue peek -->
  <ellipse cx="256" cy="286" rx="22" ry="12" fill="#FF7070"/>

  <!-- "Kiddos" text -->
  <text
    x="256"
    y="420"
    text-anchor="middle"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Fredoka One', Arial, sans-serif"
    font-weight="900"
    font-size="72"
    letter-spacing="2"
    fill="white"
    filter="url(#shadow)"
  >Kiddos</text>

  <!-- Small decorative hearts -->
  <g transform="translate(256, 470)" opacity="0.85">
    <path d="M-40,0 C-40,-10 -28,-18 -20,-10 C-12,-18 0,-10 0,0 C0,10 -20,22 -20,22 C-20,22 -40,10 -40,0Z" fill="#FF6B6B" transform="scale(0.7)"/>
    <path d="M10,0 C10,-10 22,-18 30,-10 C38,-18 50,-10 50,0 C50,10 30,22 30,22 C30,22 10,10 10,0Z" fill="#FF6B6B" transform="scale(0.7)"/>
  </g>
</svg>
